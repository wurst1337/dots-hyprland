general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # path = ~/Pictures/wallpaper.jpg
    color = rgb(15, 15, 15)
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgb(55, 55, 55) rgb(131, 131, 131) 45deg
    inner_color = rgb(30, 30, 30)
    font_color = rgb(224, 224, 224)
    fade_on_empty = false
    placeholder_text = <span foreground="##e0e0e0">Password...</span>
    hide_input = false
    rounding = 3
    fail_color = rgb(204, 34, 34) rgb(131, 131, 131) 45deg
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(224, 224, 224)
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}