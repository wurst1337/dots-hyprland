#
# Config by wurst1337, https://github.com/wurst1337/dots-hyprland
#

# Monitor preferences (probably, you want to change on yours)
monitor=HDMI-A-1, 1920x1080@100, 0x0, 1

# Soft
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$browser = firefox

#################
### Autostart###
#################

exec-once = waybar & awww-daemon # Waybar and Wallpaper daemon
exec-once = hypridle # For idle and auto lock
exec-once = wl-paste --type text --watch cliphist store # To store
exec-once = wl-paste --type image --watch cliphist store # To Store

exec-once = ~/.config/hypr/scripts/autosaver.sh

source = ~/.cache/wal/colors-hyprland.conf

exec-once = wal -R # Reverto by pywal



#################
### ENV  ########
#################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#################
### MAIN LOOK ###
#################

general {
    gaps_in = 10
    gaps_out = 15
    gaps_workspaces = 50
    border_size = 3
    col.active_border = $color1 $color2 45deg # (may be changed by pywal)
    col.inactive_border = rgba(595959aa) # (may be changed by pywal)
    resize_on_border = true
    allow_tearing = true

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  easeInOutCubic, slidefade
    animation = workspacesIn,  1,     1.21,  easeInOutCubic, slidefade
    animation = workspacesOut, 1,     1.94,  easeInOutCubic, slidefade
    animation = zoomFactor,    1,     7,     quick
}


dwindle {
    pseudotile = true
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules = 

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}
gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER


bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, $browser
bind = $mainMod, G, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

bind = $mainMod, N, exec, swaync-client -t -sw 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, u
bind = $mainMod, k, movefocus, d

bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, J, movewindow, d
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, L, movewindow, r

bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, down,  movewindow, d
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, right, movewindow, r

bind = $mainMod SHIFT, left,  workspace, r-1
bind = $mainMod SHIFT, right, workspace, r+1
bind = $mainMod SHIFT, up,    workspace, r-1
bind = $mainMod SHIFT, down,  workspace, r+1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied"

bind = $mainMod SHIFT, E, exec, grim -g "$(slurp)" - | swappy -f -

bind = $mainMod, F, fullscreen, 0

bind = $mainMod CONTROL SHIFT, left, movetoworkspace, r-1
bind = $mainMod CONTROL SHIFT, right, movetoworkspace, r+1

bind = $mainMod CONTROL SHIFT, H, movetoworkspace, r-1
bind = $mainMod CONTROL SHIFT, L, movetoworkspace, r+1

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

render {
    direct_scanout = true
}

cursor {
    no_hardware_cursors = false
}