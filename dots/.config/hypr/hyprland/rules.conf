windowrule = center on, match:class ^(polkit-gnome-authentication-agent-1)$

windowrule = float on, match:class ^(lxappearance)$
windowrule = center on, match:class ^(lxappearance)$

windowrule = float on, match:class ^(qt5ct|qt6ct)$
windowrule = center on, match:class ^(qt5ct|qt6ct)$

windowrule = float on, match:title ^(Developer Tools).*
windowrule = center on, match:title ^(Developer Tools).*

windowrule = float on, match:title ^(Picture-in-Picture).*
