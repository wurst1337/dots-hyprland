windowrule = center on, match:title ^(Open|Save|Save As|Choose|Select).*

windowrule = float on, match:title ^(Preferences|Settings|Properties).*
windowrule = center on, match:title ^(Preferences|Settings|Properties).*

windowrule = float on, match:title ^(Confirm|Confirmation|Error|Warning).*
windowrule = center on, match:title ^(Confirm|Confirmation|Error|Warning).*

windowrule = float on, match:class ^pavucontrol$
